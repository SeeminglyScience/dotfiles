# yaml-language-server: $schema=https://aka.ms/terminal-profiles-schema-preview
actions: []
alwaysShowTabs: true
centerOnLaunch: true
copyFormatting: all
defaultProfile: '{2595cd9c-8f05-55ff-a1d4-93f3041ca67f}'
initialCols: 140
initialRows: 38
keybindings:
  # ctrl+shift+alt is also the `Meh` modifier in my keyboard layout
  # https://configure.zsa.io/ergodox-ez/layouts/qvgO5/latest/0
  - { id: Terminal.OpenNewTabProfile0, keys: ctrl+shift+alt+0 }
  - { id: Terminal.OpenNewTabProfile1, keys: ctrl+shift+alt+1 }
  - { id: Terminal.OpenNewTabProfile2, keys: ctrl+shift+alt+2 }
  - { id: Terminal.OpenNewTabProfile3, keys: ctrl+shift+alt+3 }
  - { id: Terminal.OpenNewTabProfile4, keys: ctrl+shift+alt+4 }
  - { id: Terminal.OpenNewTabProfile5, keys: ctrl+shift+alt+5 }
  - { id: Terminal.OpenNewTabProfile6, keys: ctrl+shift+alt+6 }
  - { id: Terminal.OpenNewTabProfile7, keys: ctrl+shift+alt+7 }
  - { id: Terminal.OpenNewTabProfile8, keys: ctrl+shift+alt+8 }
  - { id: Terminal.OpenNewTabProfile9, keys: ctrl+shift+alt+9 }
  - { id: Terminal.OpenNewTabDropdown, keys: ctrl+shift+alt+t }

  - { id: Terminal.ClosePane, keys: ctrl+shift+alt+w }
  - { id: Terminal.DuplicatePaneAuto, keys: ctrl+shift+alt+; }
  - { id: Terminal.MoveFocusDown, keys: ctrl+shift+alt+j }
  - { id: Terminal.MoveFocusUp, keys: ctrl+shift+alt+k }
  - { id: Terminal.MoveFocusLeft, keys: ctrl+shift+alt+h }
  - { id: Terminal.MoveFocusRight, keys: ctrl+shift+alt+l }
  - { id: Terminal.MoveFocusPreviousInOrder, keys: ctrl+shift+alt+p }
  - { id: Terminal.MoveFocusNextInOrder, keys: ctrl+shift+alt+n }
  - { id: Terminal.ToggleCommandPalette, keys: ctrl+shift+alt+/ }

  - { id: Terminal.NextTab, keys: ctrl+tab }
  - { id: Terminal.PrevTab, keys: ctrl+shift+tab }
  - { id: Terminal.OpenNewTab, keys: ctrl+t }
  - { id: Terminal.OpenSettingsFile, keys: ctrl+comma }
  - { id: Terminal.ScrollUpPage, keys: ctrl+shift+pgup }
  - { id: Terminal.ScrollDownPage, keys: ctrl+shift+pgdn }
  - { id: Terminal.ScrollDown, keys: ctrl+shift+down }
  - { id: Terminal.ScrollUp, keys: ctrl+shift+up }

  - { id: unbound, keys: ctrl+shift+1 }
  - { id: unbound, keys: ctrl+shift+2 }
  - { id: unbound, keys: ctrl+shift+3 }
  - { id: unbound, keys: ctrl+shift+4 }
  - { id: unbound, keys: ctrl+shift+5 }
  - { id: unbound, keys: ctrl+shift+6 }
  - { id: unbound, keys: ctrl+shift+7 }
  - { id: unbound, keys: ctrl+shift+8 }
  - { id: unbound, keys: ctrl+shift+9 }
  - { id: unbound, keys: ctrl+shift+p }
  - { id: unbound, keys: alt+1 }
  - { id: unbound, keys: alt+2 }
  - { id: unbound, keys: alt+3 }
  - { id: unbound, keys: alt+4 }
  - { id: unbound, keys: alt+5 }
  - { id: unbound, keys: alt+6 }
  - { id: unbound, keys: alt+7 }
  - { id: unbound, keys: alt+8 }
  - { id: unbound, keys: alt+9 }
  - { id: unbound, keys: ctrl+w }
  - { id: unbound, keys: alt+shift+n }
  - { id: unbound, keys: alt+shift+p }
newTabMenu:
  - type: remainingProfiles
profiles:
  defaults:
    background: '#282828'
    bellStyle: none
    closeOnExit: graceful
    colorScheme: CampbellFixed
    cursorShape: bar
    font:
      face: CaskaydiaCove Nerd Font Mono
      size: 13
      weight: semi-light
    hidden: false
    historySize: 9001
    opacity: 100
    padding: 0, 0, 0, 0
    snapOnInput: true
    unfocusedAppearance: {}
    useAcrylic: false
  list:

    - name: "PowerShell Preview (msix)"
      guid: "{2595cd9c-8f05-55ff-a1d4-93f3041ca67f}"
      source: "Windows.Terminal.PowershellCore"
      hidden: false

    - name: PowerShell Preview
      commandline: C:\Program Files\PowerShell\7-preview\pwsh.exe
      guid: '{574e775e-4f2a-5b96-ac1e-a2962a402336}'
      hidden: false
      icon: ms-appx:///ProfileIcons/{574e775e-4f2a-5b96-ac1e-a2962a402336}.png
      source: Windows.Terminal.PowershellCore
      startingDirectory: '%USERPROFILE%'

    - name: PowerShell Dev
      commandline: C:\Projects\PowerShell\src\powershell-win-core\bin\Debug\net7.0\win7-x64\publish\pwsh.exe
      guid: '{9a107e8c-34dc-4ed6-977e-9edaf29c2181}'
      icon: ms-appx:///ProfileIcons/{574e775e-4f2a-5b96-ac1e-a2962a402336}.png
      startingDirectory: '%USERPROFILE%'
      tabColor: '#003F52'

    - name: Ubuntu
      closeOnExit: graceful
      commandline: >-
        wsl.exe
        -d
        Ubuntu
        pwsh
      guid: '{2c4de342-38b7-51cf-b940-2309a097f518}'
      hidden: false
      icon: ms-appx:///ProfileIcons/{9acb9455-ca41-5af7-950f-6bca1bc9722f}.png
      source: Windows.Terminal.Wsl
      tabColor: '#FA6400'

    - name: PowerShell Preview (Elevated)
      commandline: C:\Program Files\PowerShell\7-preview\pwsh.exe
      elevate: true
      guid: '{5846e014-290f-40b1-ac22-a7c5033c06d3}'
      icon: ms-appx:///ProfileIcons/{574e775e-4f2a-5b96-ac1e-a2962a402336}.png
      startingDirectory: '%USERPROFILE%'

    - name: PowerShell Stable
      commandline: C:\Program Files\PowerShell\7\pwsh.exe
      guid: '{bebff024-08e0-4260-8938-62b63e1517de}'
      icon: ms-appx:///ProfileIcons/{574e775e-4f2a-5b96-ac1e-a2962a402336}.png
      startingDirectory: '%USERPROFILE%'

    - name: Windows PowerShell
      guid: '{61c54bbd-c2c6-5271-96e7-009a87ff44bf}'
      icon: ms-appx:///ProfileIcons/{61c54bbd-c2c6-5271-96e7-009a87ff44bf}.png
      startingDirectory: '%USERPROFILE%'
      tabColor: '#3B78FF'

    - name: PowerShell Preview (32-bit)
      commandline: C:\Program Files (x86)\PowerShell\7-preview\pwsh.exe
      guid: '{bd5248c8-7568-41d1-bff0-b81cd79f12de}'
      icon: ms-appx:///ProfileIcons/{574e775e-4f2a-5b96-ac1e-a2962a402336}.png
      startingDirectory: '%USERPROFILE%'

    - name: cmd
      closeOnExit: graceful
      guid: '{0caa0dad-35be-5f56-a8ff-afceeeaa6101}'
      icon: ms-appx:///ProfileIcons/{0caa0dad-35be-5f56-a8ff-afceeeaa6101}.png
      startingDirectory: '%USERPROFILE%'

